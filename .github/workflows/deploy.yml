name: Build & deploy (preview)

# Phase 1 pipeline: build the static Astro site and upload it to a PREVIEW
# subfolder on GoDaddy via FTPS, so we can verify on the real host before
# touching the live root. Requires three repo secrets:
#   FTP_SERVER    — GoDaddy host or IP (Settings → Secrets and variables → Actions)
#   FTP_USERNAME  — e.g. deploy@xile.us
#   FTP_PASSWORD  — the FTP account password
#
# Going live (later): change `server-dir` to `public_html/` and remove the
# SITE_BASE env so the build targets the root, OR map a `preview.xile.us`
# subdomain to public_html/preview for a clean staging URL.

on:
  push:
    # `main` is the eventual production trigger; the dev branch is included so
    # we can verify the preview deploy before a default-branch/main exists.
    branches: [main, claude/clever-shannon-5yw1f7]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-preview
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build (preview base)
        run: npm run build
        env:
          SITE_BASE: /preview/

      - name: Upload to GoDaddy via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./dist/
          server-dir: public_html/preview/
